name: healthtrack
description: "HealthTrack — Adaptive Health Management Platform (Android App)"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

#  flutter_local_notifications: ^22.0.1
  # API
  http: ^1.2.0
  dio: ^5.4.0

  # State
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.3.1

  # Firebase
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0

  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Charts
  fl_chart: ^1.2.0

  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  shimmer: ^3.0.0
  fluttertoast: ^9.1.0
  percent_indicator: ^4.2.3
  table_calendar: ^3.1.1
  timeline_tile: ^2.0.0
  local_auth: ^2.3.0

  # Audio
  audioplayers: ^6.0.0

  # Pickers
  flutter_datetime_picker_plus: ^2.1.0
  image_picker: ^1.0.7

  # Permissions
  permission_handler: ^12.0.3

  # Auth
  google_sign_in: 6.2.1

  # Sensors
  pedometer: ^4.0.2

  # Network
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/